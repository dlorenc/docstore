# GKE standard node deployment for ci-runner.
#
# Uses rootless buildkitd (moby/buildkit-rootless) so no SYS_ADMIN is needed.
# DinD sidecar uses docker:27-dind (privileged) — standard GKE allows privileged
# pods unlike Autopilot. DinD listens on TCP 2375; build steps reach it via
# DOCKER_HOST=tcp://localhost:2375. Socket files are not accessible from BuildKit
# OCI worker containers even with --oci-worker-no-process-sandbox.
#
# Pre-requisites (run scripts/setup-gke.sh first):
#   - GKE cluster with Workload Identity enabled
#   - ci-runner GCP SA bound to the k8s SA below
#   - docstore-ci/ci-runner k8s Secret populated
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-runner
  namespace: docstore-ci
  annotations:
    iam.gke.io/gcp-service-account: ci-runner@dlorenc-chainguard.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-runner
  namespace: docstore-ci
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ci-runner
  template:
    metadata:
      labels:
        app: ci-runner
    spec:
      serviceAccountName: ci-runner
      nodeSelector:
        cloud.google.com/gke-nodepool: default-pool
      # rootlesskit needs AppArmor unconfined to set up mount namespaces within
      # the user namespace. seccompProfile Unconfined is also required.
      securityContext:
        appArmorProfile:
          type: Unconfined
      containers:
      - name: ci-runner
        image: us-central1-docker.pkg.dev/dlorenc-chainguard/images/ci-runner-gke:latest
        env:
        - name: DOCSTORE_URL
          value: https://docstore-efuj4cj54a-uc.a.run.app
        - name: LOG_STORE
          value: gcs
        - name: LOG_BUCKET
          value: docstore-ci-logs
        - name: WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: ci-runner
              key: webhook-secret
              optional: true
        - name: RUNNER_URL
          valueFrom:
            secretKeyRef:
              name: ci-runner
              key: runner-url
              optional: true
        ports:
        - containerPort: 8080
        securityContext:
          seccompProfile:
            type: Unconfined
          runAsUser: 1000
          runAsNonRoot: true
        resources:
          requests:
            cpu: "2500m"
            memory: "4Gi"
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
      - name: docker-dind
        image: docker:27-dind
        args: ["--host=tcp://0.0.0.0:2375", "--tls=false"]
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          tcpSocket:
            port: 2375
          initialDelaySeconds: 5
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ci-runner
  namespace: docstore-ci
  annotations:
    # Internal load balancer: reachable from Cloud Run via VPC Direct Egress,
    # not exposed to the public internet.
    networking.gke.io/load-balancer-type: "Internal"
spec:
  selector:
    app: ci-runner
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer
