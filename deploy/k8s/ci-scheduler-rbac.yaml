# RBAC for ci-scheduler.
#
# ci-scheduler needs cluster-wide permission to call TokenReview (to validate
# projected SA tokens from ci-worker pods), and namespace-scoped permission to
# read Pods and Jobs in docstore-ci (to verify pod provenance).
---
# ClusterRole: allow TokenReview creation (cluster-scoped resource).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ci-scheduler-tokenreview
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ci-scheduler-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ci-scheduler-tokenreview
subjects:
- kind: ServiceAccount
  name: ci-scheduler
  namespace: docstore-ci
---
# Role: allow reading Pods and Jobs in the docstore-ci namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-scheduler-pod-job-reader
  namespace: docstore-ci
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-scheduler-pod-job-reader
  namespace: docstore-ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ci-scheduler-pod-job-reader
subjects:
- kind: ServiceAccount
  name: ci-scheduler
  namespace: docstore-ci
