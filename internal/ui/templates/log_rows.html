{{define "log_rows.html"}}
{{range .Rows}}
<tr>
  <td><a href="/r/{{$.Repo.Name}}/b/{{urlPathEscape $.Branch}}/c/{{.Seq}}">{{.Seq}}</a></td>
  <td>{{.Message}}</td>
  <td><a href="/u/{{.Author}}">{{.Author}}</a></td>
  <td>{{relTime .Time}}</td>
</tr>
{{end}}
{{if .HasMore}}
<tr hx-get="/_/r/{{.Repo.Name}}/b/{{urlPathEscape .Branch}}/log?after={{.NextAfter}}"
    hx-trigger="revealed"
    hx-target="closest tr"
    hx-swap="outerHTML">
  <td colspan="4" class="load-more">loading more…</td>
</tr>
{{end}}
{{end}}
