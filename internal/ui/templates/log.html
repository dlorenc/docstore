{{define "content"}}
{{with .Body}}
<div class="headline">
  <h1>{{.Repo.Name}} / {{.Branch}} / log</h1>
</div>

<div class="card">
  {{if not .Rows}}
    <div class="empty">no commits yet</div>
  {{else}}
  <table class="grid">
    <thead><tr><th>seq</th><th>message</th><th>author</th><th>when</th></tr></thead>
    <tbody id="log-rows">
      {{template "log_rows.html" .}}
    </tbody>
  </table>
  {{end}}
</div>
{{end}}
{{end}}
