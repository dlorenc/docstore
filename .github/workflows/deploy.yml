name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: ko-build/setup-ko@v0.7

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/320310132788/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: docstore-deployer@dlorenc-chainguard.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure ko
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        env:
          KO_DOCKER_REPO: us-central1-docker.pkg.dev/dlorenc-chainguard/images/docstore
        run: |
          IMAGE=$(ko build --bare --tags latest,$(git rev-parse --short HEAD) ./cmd/docstore)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy docstore \
            --image=${{ steps.build.outputs.image }} \
            --project=dlorenc-chainguard \
            --region=us-central1 \
            --service-account=docstore-server@dlorenc-chainguard.iam.gserviceaccount.com \
            --add-cloudsql-instances=dlorenc-chainguard:us-central1:docstore-mvp \
            --update-secrets=DATABASE_URL=docstore-db-url:latest,IAP_CLIENT_SECRET=iap-oauth-client-secret:latest,ARCHIVE_HMAC_SECRET=archive-hmac-secret:latest \
            --set-env-vars=ARCHIVE_BASE_URL=https://docstore-efuj4cj54a-uc.a.run.app,OIDC_JWKS_URL=https://oidc.docstore.dev/.well-known/jwks.json,OIDC_AUDIENCE=docstore,OIDC_ISSUER=https://oidc.docstore.dev \
            --ingress=internal-and-cloud-load-balancing \
            --min-instances=1 \
            --max-instances=1 \
            --no-cpu-throttling \
            --port=8080 \
            --network=default \
            --subnet=default \
            --vpc-egress=private-ranges-only \
            --args=--bootstrap-admin=dlorenc@chainguard.dev,--iap-client-id=320310132788-md94jtp0d9fdcdlq2quma4mcpr0ul1qr.apps.googleusercontent.com

      - name: Grant CI workers access to docstore internal URL
        run: |
          gcloud run services add-iam-policy-binding docstore \
            --region=us-central1 \
            --project=dlorenc-chainguard \
            --member=allUsers \
            --role=roles/run.invoker || true

  build-and-deploy-ci-scheduler:
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/320310132788/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: docstore-deployer@dlorenc-chainguard.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: docstore-ci
          location: us-central1
          project_id: dlorenc-chainguard

      - uses: ko-build/setup-ko@v0.7

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push ci-scheduler image
        id: build
        env:
          KO_DOCKER_REPO: us-central1-docker.pkg.dev/dlorenc-chainguard/images/ci-scheduler
        run: |
          IMAGE=$(ko build --bare --tags latest,$(git rev-parse --short HEAD) ./cmd/ci-scheduler)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy ci-scheduler to GKE
        run: |
          kubectl apply -f deploy/k8s/ci-scheduler.yaml
          kubectl set image deployment/ci-scheduler \
            ci-scheduler=${{ steps.build.outputs.image }} \
            -n docstore-ci
          kubectl rollout status deployment/ci-scheduler -n docstore-ci --timeout=300s

      - name: Apply ci-scheduler RBAC
        run: |
          kubectl apply -f deploy/k8s/ci-scheduler-rbac.yaml

      - name: Update ci-runner-url secret
        run: |
          # Update the ci-runner-url secret if the LB IP has changed.
          # On first deploy the LB may still be provisioning; on subsequent
          # deploys the IP is stable and this is a no-op.
          IP=$(kubectl get svc ci-scheduler -n docstore-ci \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
          if [ -z "$IP" ]; then
            echo "WARNING: internal LB IP not yet assigned; ci-runner-url not updated"
            exit 0
          fi
          CURRENT=$(gcloud secrets versions access latest \
            --secret=ci-runner-url --project=dlorenc-chainguard 2>/dev/null || true)
          WANT="http://${IP}:8080"
          if [ "$CURRENT" = "$WANT" ]; then
            echo "ci-runner-url already set to ${WANT}, skipping"
          else
            printf "%s" "$WANT" | \
              gcloud secrets versions add ci-runner-url \
                --data-file=- --project=dlorenc-chainguard
            echo "ci-runner-url updated to ${WANT}"
          fi

  build-and-deploy-ci-worker:
    runs-on: ubuntu-latest
    needs: [deploy, build-and-deploy-ci-scheduler]
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/320310132788/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: docstore-deployer@dlorenc-chainguard.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: docstore-ci
          location: us-central1
          project_id: dlorenc-chainguard

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push ci-worker image
        id: build
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.ci-worker \
            -t us-central1-docker.pkg.dev/dlorenc-chainguard/images/ci-worker:latest \
            -t us-central1-docker.pkg.dev/dlorenc-chainguard/images/ci-worker:${SHA} \
            --push \
            --metadata-file /tmp/ci-worker-metadata.json \
            .
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/ci-worker-metadata.json)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Deploy ci-worker to GKE
        run: |
          kubectl delete deployment ci-worker --ignore-not-found -n docstore-ci
          kubectl apply -f deploy/k8s/ci-worker.yaml
          kubectl patch scaledjob ci-worker -n docstore-ci \
            --type='json' \
            -p='[{"op":"replace","path":"/spec/jobTargetRef/template/spec/containers/0/image","value":"us-central1-docker.pkg.dev/dlorenc-chainguard/images/ci-worker@${{ steps.build.outputs.digest }}"}]'

  build-and-deploy-ci-oidc:
    runs-on: ubuntu-latest
    needs: [deploy, build-and-deploy-ci-scheduler]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/320310132788/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: docstore-deployer@dlorenc-chainguard.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: docstore-ci
          location: us-central1
          project_id: dlorenc-chainguard

      - uses: ko-build/setup-ko@v0.7

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push ci-oidc image
        id: build
        env:
          KO_DOCKER_REPO: us-central1-docker.pkg.dev/dlorenc-chainguard/images/ci-oidc
        run: |
          IMAGE=$(ko build --bare --tags latest,$(git rev-parse --short HEAD) ./cmd/ci-oidc)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy ci-oidc (internal)
        run: |
          gcloud run deploy ci-oidc \
            --image=${{ steps.build.outputs.image }} \
            --project=dlorenc-chainguard \
            --region=us-central1 \
            --service-account=ci-oidc@dlorenc-chainguard.iam.gserviceaccount.com \
            --add-cloudsql-instances=dlorenc-chainguard:us-central1:docstore-mvp \
            --update-secrets=DATABASE_URL=docstore-db-url:latest,KMS_KEY_VERSION=ci-oidc-kms-key-version:latest \
            --ingress=internal \
            --allow-unauthenticated \
            --min-instances=1 \
            --max-instances=3 \
            --no-cpu-throttling \
            --port=8081 \
            --network=default \
            --subnet=default \
            --vpc-egress=private-ranges-only

      - name: Store internal token URL in Secret Manager
        run: |
          OIDC_INTERNAL_URL=$(gcloud run services describe ci-oidc \
            --region=us-central1 \
            --project=dlorenc-chainguard \
            --format='value(status.url)')
          printf '%s' "${OIDC_INTERNAL_URL}/ci/token" | \
            gcloud secrets versions add ci-oidc-token-url \
              --data-file=- --project=dlorenc-chainguard \
            || printf '%s' "${OIDC_INTERNAL_URL}/ci/token" | \
            gcloud secrets create ci-oidc-token-url \
              --data-file=- --project=dlorenc-chainguard \
              --replication-policy=automatic
          echo "oidc_internal_url=${OIDC_INTERNAL_URL}" >> $GITHUB_ENV

      - name: Deploy ci-oidc-public (public)
        run: |
          gcloud run deploy ci-oidc-public \
            --image=${{ steps.build.outputs.image }} \
            --project=dlorenc-chainguard \
            --region=us-central1 \
            --service-account=ci-oidc-public@dlorenc-chainguard.iam.gserviceaccount.com \
            --update-secrets=KMS_KEY_VERSION=ci-oidc-kms-key-version:latest \
            --set-env-vars=PUBLIC_ONLY=true \
            --ingress=all \
            --allow-unauthenticated \
            --min-instances=1 \
            --max-instances=10 \
            --port=8081

      - name: Create domain mapping for ci-oidc-public (idempotent)
        run: |
          gcloud run domain-mappings create \
            --service=ci-oidc-public \
            --domain=oidc.docstore.dev \
            --region=us-central1 \
            --project=dlorenc-chainguard \
            2>/dev/null || echo 'domain mapping already exists'

      - name: Update ci-scheduler OIDC_TOKEN_URL in GKE
        run: |
          kubectl set env deployment/ci-scheduler \
            OIDC_TOKEN_URL="${{ env.oidc_internal_url }}/ci/token" \
            -n docstore-ci
