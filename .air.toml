root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/docstore ./cmd/docstore"
  bin = "./tmp/docstore"
  # Reload on .go changes only; templates are read from disk in DEV_UI mode.
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor"]
  delay = 500

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
